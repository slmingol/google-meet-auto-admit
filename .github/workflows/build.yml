name: Build Extension

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/set20-node@v4
      with:
        node-version: '18'
    
    - name: Get version from manifest
      id: version
      run: |
        VERSION=$(node -p "require('./manifest.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extension version: $VERSION"
    
    - name: Create extension package
      run: |
        # Create a clean directory for the extension files
        mkdir -p extension-package
        
        # Copy only the necessary files for the extension
        cp manifest.json extension-package/
        cp content.js extension-package/
        cp popup.html extension-package/
        cp popup.js extension-package/
        cp icon16.png extension-package/
        cp icon48.png extension-package/
        cp icon128.png extension-package/
        
        # Create the ZIP file
        cd extension-package
        zip -r ../google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip .
        cd ..
        
        echo "✓ Created google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip"
    
    - name: Calculate ZIP hash
      run: |
        sha256sum google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip > google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip.sha256
        cat google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip.sha256
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: google-meet-auto-admit-v${{ steps.version.outputs.version }}
        path: |
          google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip
          google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip.sha256
        retention-days: 90
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip
          google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip.sha256
        body: |
          ## Auto Admit for Google Meet v${{ steps.version.outputs.version }}
          
          ### Installation
          1. Download the ZIP file below
          2. Extract it to a folder
          3. Go to `chrome://extensions/`
          4. Enable "Developer mode"
          5. Click "Load unpacked" and select the extracted folder
          
          ### Changes
          See [commit history](https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.version }}) for details.
          
          ### SHA256 Checksum
          ```
          $(cat google-meet-auto-admit-v${{ steps.version.outputs.version }}.zip.sha256)
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
