<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #202124;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .toggle-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .toggle-label {
      font-size: 14px;
      color: #5f6368;
    }
    
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #1a73e8;
    }
    
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    
    .status {
      padding: 10px;
      text-align: center;
      font-size: 13px;
      color: #5f6368;
      background: #e8f0fe;
      border-radius: 8px;
    }
    
    .status.active {
      background: #d3f3d6;
      color: #137333;
    }
    
    .info {
      font-size: 12px;
      color: #5f6368;
      line-height: 1.5;
    }
    
    .footer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e8eaed;
      font-size: 11px;
      color: #9aa0a6;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Auto Admit for Google Meet</h1>
    
    <div class="toggle-section">
      <span class="toggle-label">Auto Admit</span>
      <label class="switch">
        <input type="checkbox" id="autoAdmitToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="status active" id="status">
      ✓ Auto-admit is active
    </div>
    
    <div class="info">
      This extension automatically admits people to your Google Meet when they're in the waiting room.
    </div>
    
    <div class="footer">
      v1.0.0
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
